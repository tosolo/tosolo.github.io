<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tosolo — games</title>
  <style>
    :root {
      --bg: #666666;
      --card: #e3e3e3;
      --card-text: #111;
      --card-text-dim: #444;
      --line: #bdbdbd;
      --text: #f5f5f5;
      --text-dim: #d8d8d8;
      --button: #111;
      --button-hover: #1f1f1f;
      --button-text: #fff;
      --card-height: 120px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .wrap {
      width: 100%;
      max-width: 720px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 16px;
    }

    .logo-img {
      width: 128px;
      height: 128px;
      object-fit: contain;
    }

    .brand-stack {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand-title {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: 1px;
      line-height: 1;
    }

    .brand-sub {
      color: var(--text-dim);
      font-size: 15px;
      margin-top: 2px;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 16px 0 28px;
    }

    .projects .item {
      border: none;
      border-radius: 0 999px 999px 0;
      padding: 0 22px 0 0;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 18px;
      background: var(--card);
      height: var(--card-height);
      overflow: hidden;
    }

    .item-title {
      font-weight: 900;
      font-size: 22px;
      letter-spacing: 0.6px;
      color: var(--card-text);
      text-transform: uppercase;
    }

    .tags {
      color: var(--card-text-dim);
      font-size: 12px;
      margin-left: 8px;
      font-weight: 600;
    }

    .cmd-links a {
      color: var(--button-text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-right: 8px;
      padding: 6px 14px;
      background: var(--button);
      border: 1px solid var(--button);
      border-radius: 8px;
      font-size: 13px;
      transition: background 0.2s, border-color 0.2s;
    }

    .cmd-links {
      margin-top: 10px;
    }

    .cmd-links a:hover {
      background: var(--button-hover);
      border-color: var(--button-hover);
    }

    .cmd-links img {
      width: 18px;
      height: 18px;
      display: block;
    }

    .label-short {
      display: none;
    }

    .icon-box {
      width: var(--card-height);
      height: var(--card-height);
      border-radius: 0;
      overflow: hidden;
      flex-shrink: 0;
      background: #2f2f2f;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .icon-box.placeholder {
      border: 1px dashed #7a7a7a;
      color: #666;
      font-size: 12px;
      text-align: center;
      line-height: 1.4;
    }

    .game-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      color: var(--card-text);
    }

    footer {
      border-top: 1px solid var(--line);
      margin-top: 32px;
      padding-top: 16px;
      font-size: 13px;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer a {
      color: var(--text-dim);
      text-decoration: none;
      margin-right: 16px;
      transition: color 0.2s;
    }

    footer a:hover {
      color: var(--text);
    }

    /* Responsive */
    @media (max-width: 600px) {
      body {
        padding: 24px 16px;
      }

      .header {
        align-items: center;
        gap: 12px;
      }

      .logo-img {
        width: var(--card-height);
        height: var(--card-height);
      }

      .brand-title {
        font-size: 40px;
      }

      .projects .item {
        padding: 0 16px 0 0;
        gap: 14px;
        height: var(--card-height);
        border-radius: 0 999px 999px 0;
      }

      .icon-box {
        width: 96px;
        height: 96px;
        border-radius: 0;
      }

      .game-info {
        width: 100%;
      }

      .cmd-links {
        display: flex;
        justify-content: flex-start;
      }

      .cmd-links a {
        margin-right: 8px;
      }

      .label-long {
        display: none;
      }

      .label-short {
        display: inline;
      }

      footer {
        flex-direction: column;
        align-items: center;
        gap: 8px;
        text-align: center;
      }
    }
  </style>
</head>

<body>
<div class="wrap">

<div class="header">
  <img class="logo-img" src="logo_renewal.png" alt="tosolo">
  <div class="brand-stack">
    <div class="brand-title">TOSOLO</div>
    <div class="brand-sub">Let's make something new!</div>
  </div>
</div>

<div class="divider"></div>

<div class="projects">

  <!-- Frog Domino -->
  <div class="item">
    <div class="icon-box">
      <img src="frog_domino_icon.png" alt="Frog Domino icon">
    </div>

    <div class="game-info">
      <div>
        <div class="item-title">FROG DOMINO</div>
        <div class="tags">#Puzzle #Direction #Chain_Reaction</div>
      </div>

      <div class="cmd-links">
        <a href="https://play.google.com/store/apps/details?id=com.tosolo.frogdomino" target="_blank" rel="noopener">
          <img src="google logo.png" alt="Google Play">
          <span class="label-long">Google Play</span>
          <span class="label-short">Google</span>
        </a>
        <a href="https://apps.apple.com/us/app/frog-domino/id6760164161" target="_blank" rel="noopener">
          <img src="apple logo.png" alt="App Store">
          <span class="label-long">App Store</span>
          <span class="label-short">Apple</span>
        </a>
      </div>
    </div>
  </div>

  <!-- Next Project -->
  <div class="item">
    <div class="icon-box placeholder">
      coming<br>soon
    </div>

    <div class="game-info">
      <div>
        <div class="item-title">Next Project</div>
        <div class="tags">#tba</div>
      </div>
    </div>
  </div>

</div>

<footer>
  <div>
    <a href="terms.html">Terms</a>
    <a href="privacy.html">Privacy</a>
  </div>
  <div>&copy; <span id="year"></span> tosolo</div>
</footer>
</div>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
